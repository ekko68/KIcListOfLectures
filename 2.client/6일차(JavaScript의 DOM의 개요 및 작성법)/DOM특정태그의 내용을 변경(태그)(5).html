<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>DOM특정태그의 내용을 변경(태그)(5).html </title>
  <script>
    /*
	  appendChild(태그생성),removeChild(태그삭택),replaceChild(new,old) 수정
	*/
    window.onload=function(){
        //new
		var newNode=document.createElement('div')//<div></div>
		newNode.innerHTML='오늘은 DOM을 사용하는 연습중'
		//old
		var oldNode=document.getElementById('foo')
		//형식)부모태그명.replaceChild(new,old)->old->new로 변경
		var parentNode=oldNode.parentNode //자식태그정보.parentNode
         parentNode.replaceChild(newNode,oldNode)
	}
  </script>
 </head>
 <body>
   <p id="foo">태그의 내용 변경 연습
   <!-- <div>오늘은 DOM을 사용하는 연습중</div> -->
 </body>
</html>
