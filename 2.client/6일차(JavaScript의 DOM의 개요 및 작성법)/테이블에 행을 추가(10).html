<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>테이블에 행을 추가(10).html </title>
  <style>
            table#myTable {
                    width:300px;
					border:1px solid black;
					/* 테이블과 테이블 레이아웃에 자주 사용하는 속성
					   default->seperate(테두리 사이에 간격 나누기)
					*/
					border-collapse:collapse; /* 테두리 사이의 간격을 제거 */
			}
			#myTable th, #myTable td{
                  border:1px solid black;
			}
            #myTable > tfoot td{
                 text-align:right;
			}
  </style>
  <script>
          function addRow(){
             var table=document.getElementById("myTable")
			 //행을 추가->3개의 td를 생성->tr에 추가->tr->tbody에 추가
			 var td1=document.createElement("td");//번호  <td></td>
			 var td2=document.createElement("td");//이름
			 var td3=document.createElement("td");//연락처
			 //2.생성된 td요소들에 각 저장할 문자열을 넣어주면
			 td1.innerHTML="2"   //<td>2</td>
             td2.innerHTML="김길수" //<td>김길수</td>
			 td3.innerHTML="010-123-0987"
			 //3.td와 연결시킬 tr객체 생성
			 var tr=document.createElement("tr")//<tr></tr>
			 tr.style.textAlign="center" //글자 가운데
             //4.생성된 tr객체에 추가
			 tr.appendChild(td1)//<tr><td>2</td>~</tr>
             tr.appendChild(td2)
			 tr.appendChild(td3)
			 //5.tr태그가 들어간 tbody를 검색
			 var tbody=table.children[2] //www.w3schools.com
			 //alert(tbody)//[~]
			 //6.tbody에 결합->appendChild(~)
			 tbody.appendChild(tr)
		  }
  </script>
 </head>
 <body>
   <h1>테이블에 행을 추가시켜주는 예제</h1>
   <table id="myTable">
       <!-- 테이블 헤더그룹(헤더,바디,푸터) -->
	   <thead>
            <tr>
                <th>번호</th>
				<th>이름</th>
				<th>연락처</th>
			</tr>
	   </thead>
       <tfoot>
           <tr>
              <td colspan="3">
			    <input type="button" value="추가" onclick="addRow()" />&nbsp;
                <input type="button" value="지우기" onclick="" />
			  </td>
		   </tr>
	   </tfoot>
	   <tbody>
             <tr>
                <td>1</td>
				<td>홍길동</td>
				<td>02-123-0987</td>
			 </tr>
			 <!--
			   <tr>
                <td>2</td>
				<td>홍길동</td>
				<td>02-123-0987</td>
			 </tr> -->
	   </tbody>
   </table>
 </body>
</html>
