<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>html5에서 추가된속성(3).html </title>
 </head>
 <body>
 <!-- html5에서 추가된 속성
    input type=email->이메일 전용 
	                             입력양식:placeholder를 이용해서 미리보기
								              required->필수입력을 설정할때
											                  유효성 검사(올바른 값을 입력체크)
    input type=url(웹전용 url)
    date(날짜입력) x->입력취소 컴보박스형태로 날짜를 선택
	tiem(시간입력)
    datetime(날짜시간)
 -->
  <form name="frm">
     사용자 id:<input type="text" name="id" size="10"><br>
	 비밀 번호:<input type="password" name="pw" size="10" required><br>
	 이메일:<input type="email" placeholder="123@abc.com" required><br>
	 웹주소:<input type="url" placeholder="http://www.abc.com" required><br>

	 원하는 날짜와 시간을 설정해 주세요<br>
	 <input type="date"><br><!-- FireX -->
	 <input type="time"><br><!-- FireX -->
	 <input type="datetime"><br><!-- FireX ,Chrome X-->
	 <input type="submit"><br>
  </form>
 </body>
</html>
