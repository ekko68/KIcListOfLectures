<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>DIV태그와 SPAN태그의 특성(4).html</title>
   <style>
		div {
		      background:green; /* 배경색 */
			  width:200px;
			  height:50px;

		     }
		span{
		         background:yellow; /* 배경색 */
			     width:200px;
			     height:50px;
				 
				 display:block; /* inline->block요소형태로 화면 
				 display->화면에 보여주는 특성(block,inline~)
				 */
		       }
   </style>
 </head>
 <body>
    <!--  
	   div태그 ->1.자동으로 줄바꿈이 일어나는 Block요소 태그
	                  2.레이아웃을 설정->width,height 이용->영역설정가능
                      3.하나의 빈행을 만들어주는 태그

	   span태그->1.자동으로 줄바꿈이 일어나지 않는 inline요소 태그
	                    2.width,height를 설정X
	                    3.하나의 행의 뒤에 계속해서 추가되는 모습
	-->
     <h1>Div태그와 SPAN태그의 차이점</h1>
	 <div>Div태그 연습입니다.</div>
	 <div>Div태그 연습2입니다.</div>
	 <div>Div태그 연습3입니다.</div>

	 <span>Span태그 연습입니다.</span>
     <span>Span태그 연습2입니다.</span>
	 <span>Span태그 연습3입니다.</span>
 </body>
</html>
