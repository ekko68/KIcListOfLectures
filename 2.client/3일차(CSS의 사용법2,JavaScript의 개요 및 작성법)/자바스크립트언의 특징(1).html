<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>자바스크립트언의 특징(1).html </title>
  <script type="text/javascript">
     alert("자바스크립트 실행중")
  </script>
 </head>
 <body>
     <section>
         <header>
              <h4>자바스크립트 언어</h4>
		 </header>
		 <article>
              <ol><!-- 번역(컴퓨터가 알아듣는말로 번역(컴파일)과정 실행-->
				<li>head태그내부에서 &lt;script&gt;태그내부에서 문법에 작성</li>
				<li>html5+css+javascript코드이 섞여서 브라우저가 번역해서 실행</li>
				<li>함수형 언어로 구성(자바(메서드))
				<li>플랫폼(운영체제)에 상관없이 다 실행</li>
				<li>따로 자바스크립트도 파일로 만들어서 불러올 수 있다.</li>
              </ol><!-- src="경로포함해서 불러올 파일명.js" -->
			 <script src="myScript.js"></script>
		 </article>
	 </section>
 </body>
</html>
