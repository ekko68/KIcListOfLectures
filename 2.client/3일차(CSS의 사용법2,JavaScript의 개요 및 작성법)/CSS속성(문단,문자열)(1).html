<!doctype html>
<html>
 <head>
 <!-- 
    letter-spacing->글자와 글자사이의 간격을 표시
	word-spacing->단어와 단어사이의 간격
	line-height->줄 간격사이의 표시
  -->
  <meta charset="UTF-8">
  <title>CSS속성(문단,문자열)(1).html</title>
  <style type="text/css">
	   .normal {font-size:20pt}
	   .letter-spacing {letter-spacing:10px;font-size:20pt}
	   .word-spacing {word-spacing:20px;font-size:20pt}
	   .line-height {line-height:50pt}
  </style>
 </head>
 <body>
  <p class="normal">
    글자와 글자사이의 간격을 조절하지 않았을 경우(default)
  </p>
  <p class="letter-spacing">
    글자와 글자사이의 간격을 10px로 지정했을 경우의 스타일효과
  </p>
  <p class="word-spacing">
    단어와 단어사이의 간격을 20xp로 지정했을 경우의 스타일효과
  </p>
  <p class="line-height">
    줄 사이의 간격을 40pt로 지정했을 때의 스타일 효과
  </p>

 </body>
</html>
