<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>변수의 선언 및 규칙(2).html</title>
  <script>
      /*  */  //사용자로부터 값을 입력을 받아서 출력
	  //prompt('사용자로부터 출력할 메세지',입력받을 기본값)
	  //문자를 입력을 받아서 저장
	  //형식) var 변수이름(ex age)=저장할값
	  //자료형->문자를 저장 or 숫자를 저장할 것인지를 정해주는것
	  var name="홍길동" //varchar2
	  var age=23       //number
	  //age=24 //중간에 값이 변동->맨 마지막값만 저장
      var dname="영업부"   //~where deptno=&deptno
       name=prompt("이름을 입력하세요?"," ")//&name
       age=prompt('나이를 입력하세요?','')
	  document.write('저장한 값은'+name+'<br>')
	  document.write('당신의 나이는'+age+'이군요'+'<br>') // ||
	  document.write('당신이 입사한 부서는'+dname+'이군요'+'<p>')
	  
  </script>
 </head>
 <body>
   <ol>변수의 특징
	<li>입출력 프로그램</li>
	<li>변수->사용자로부터 값을 입력(문자,숫자를 받아서 일시적으로 기억)</li>
    <li>변수명을 줄때 대,소문자를 구분(name,Name,NAME)->주로 소문자위주로
	<li>var 변수명(단어)=저장할값
	<li>변수의 값은 중간에 값이 변경이 되면 변경된 값이 다시 저장이 된다.
	<li>변수이름을 사용할때 주의할점->영문자로 시작하거나 _로 시작
	<li>숫자로 시작하는 변수는 작성X
	<li>에러잡기가 어렵다.(디버깅하기가 어렵다.)->chrome(디버깅)
   </ol>
 </body>
</html>
