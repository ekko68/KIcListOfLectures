<html>

	    #jb-container{
            width:940px;
			margin:0px auto; /* 위쪽(상단),아래쪽(하단)의 여백을 0  */

			border:1px solid #bcbcbc;
		}
   </style>
 </head>

        <div id="jb-header">
               <h1>2-Column Layout</h1>
