<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>CSS3에서의 추가된 속성(5).html </title>
    <style type="text/css">
		 div {border:4px solid #aaaaaa;
		         /* border-radius(둥근모서리),box-shadow(그림자효과)  */
				 border-radius:20px; /* 숫자가 커질수록 모서리의 둥근각도커짐*/
				 box-shadow:10px 10px 30px #666666;
				                    /* 오른쪽크기,아래쪽 크기, 흐림정도,색상    */
                 padding:50px;/* 글자와 테두리사이의 여백 */
		      }
    </style>
 </head>
 <body>
    <div>
         CSS3에서 스타일 적용시킬때 브라우저별로 적용이 안되는 경우도
		 있다. 접두어 -> -webkit  ->Chrome,Opera,Safari
		                       -moz ->Firefox
							   -ms ->IE기준
	</div>
 </body>
</html>
