<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>CSS3의 추가된 속성2(이미지크기)(6).html</title>
  <style type="text/css">
	  body {
	            background:url(../images/bg3.jpg);
				/* 추가 background-size:넓이 높이 */
				  /*  background-size:300px 200px; */
				background-size:100% 100%;
				background-repeat:no-repeat;  /*반복적으로 이미지 X*/
				padding-top:300px;
	       }
  </style>
 </head>
 <body>
    <div>
       <p>CSS3는 배경이미지에 관련된 새로운 속성이 추가되었는데,이전에
	    배경이미지를 저장하면 이미지의 크기에 따라 배경이 나타났지만,추가된
		속성을 이용하면 배경이미지의 크기를 지정할 수가 있다.
	</div>
 </body>
</html>
