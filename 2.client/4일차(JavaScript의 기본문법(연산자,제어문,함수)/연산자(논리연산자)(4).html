<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>연산자(논리연산자)(4).html</title>
  <!-- 
      논리연산자->참과거짓을 판별할 수있는 연산자(true or false)
	  T and T->참(&&(and))  or(또는) ||   ,not(!)
	  조건식->관계와 논리연산자
  -->
 </head>
 <body>
  <script>
            su1=(2>5) && (5<7) //and
			document.write("su1=>"+su1+"<br>")//false
			//
			su2=(2>5) || (5<7) //or
			document.write("su2=>"+su2+"<br>")//true
			document.write("!su2->"+!su2) //T->F,F->T
  </script>
 </body>
</html>
