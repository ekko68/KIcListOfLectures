<!doctype html><!-- html5의 선언부분  -->
<html><!-- html5문서의 시작태그 -->
 <head><!-- 현재 문서의 타이틀 제목,캐릭터셋(euc-kr=>UTF-8)을 설정 -->
  <meta charset="UTF-8">
  <title>html5문서구조(1).html </title>
 </head>
 <body><!-- 본문의 시작 -->
  <h1>html문서의 특징</h1><!--section(내용(소제목))  -->
   <!--strong(굵게), em(이탤릭체),u(밑줄)  -->
  1.태그내부에 또 다른 태그 사용이 가능하다.<br><!-- enter 1번 -->
  2.태그는 <strong>대소문자 구분이 없다</strong>.<br>
  3.파일 저장->~.html or ~.htm<p><!-- enter 2번 -->
  4.태그 내부에 <em>속성</em>이 존재-><u>태그의 자세한 설정</u><br>
  5.문서->문자,이미지,동영상,음악파일<br>
  6.줄바꿈=>p(단락구분),br<br>
  7.미리보기(ctrl+B)<p>
  <!-- #16진수형태로 표시(1~9,10~15(A~) 
     size->font-size, font-color(color(색깔)),font-family(face)->글꼴
   -->
  8.일반적인 글의 
  <font size=20pt color="#9933ff" face="궁서">글꼴,크기,색</font>은 font태그로 사용(css로 해결)

 </body><!-- 본문의 종료 -->
</html><!-- html5문서의 종료 -->
