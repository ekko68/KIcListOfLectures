<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>테이블 연습(7).html </title>
 </head>
 <body>
    <table width="70%" height="100%" border="2"
	          cellspacing="0" cellpadding="0">
	<!-- 표의 시작(크기 width=n|%(비율)),height ,borderr="테두리"
	cellspacing->쉘과 쉘사이의 거리, cellpadding=>쉘과 문자열 사이의 거리
	 -->
       <caption>표의 제목</caption>
	    <tr>
		   <!-- <td><strong><center>월</center></strong></td> --><!-- 열 표시 
		           <th>태그=><strong><center>(굵게,가운데로 정렬)
		   -->
		   <th>월</th>
		   <th>수</th>
		   <th>금</th>
		</tr><!-- 행 -->
		<tr><!-- align속성=left|center|right(정렬) -->
		    <td align="left" bgcolor="yellow">왼쪽</td>
			<td align="center" bgcolor="green">가운데</td>
			<td align="right" bgcolor="red">오른쪽</td>
		</tr>
	</table><!-- 표의 끝 -->
 </body>
</html>
