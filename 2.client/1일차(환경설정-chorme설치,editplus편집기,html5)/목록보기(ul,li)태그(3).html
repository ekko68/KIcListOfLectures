<!doctype html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>목록보기(ul,li)태그(3).html</title>
 </head>
 <body>
  <h1>목록보기 예제</h1>
  <!-- pre태그(형식유지)->작성한 문서내용 그대로 화면에 보여줄때(여백,줄바꿈)
         ex)게시판->글쓰기(여러줄에 걸쳐서 사용)->오라클에 저장
  -->
   <pre>지금 html5 기       준으로 웹상에서 자주 사용되는
   관련태그를 배우고    있습    
   
   니다.
   html5->css3->Javascript->jQuery,jQueryMobile</pre>
   <hr>
    <!-- ul(unorder list)(순서없는 리스트) 항목-><li></li>
	  type=circle
	-->

   <ul type="circle">순서 없는 목록
	<li>DB구현,SQL활용</li>
	<li>HTML5</li>
	<li>CSS3</li>
	<li>JavaScript</li>
	<li>jQuery & jQuery Mobile
   </ul>
   <hr>
   <!-- type=>1(디폴트)숫자, i(로마자 기호),A(대문자표시),a(소문자로 표시) -->
   <ol type="i">순서 있는 목록
	<li>Java</li>
	<li>JSP(web)</li>
	<li>Bootstrap~</li>
   </ol>
 </body>
</html>
