<!DOCTYPE html>
<html>
<head lang="ko">
<meta charset="UTF-8">
<title>RG Infinite scroll demo</title>
<!--
<meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, width=device-width">
-->
 <style>
    .gal_body {
      overflow-y: scroll;
    }
    /* clearfix because of floats */
    .gal_container:before,
    .gal_container:after {
      content: "";
      display: table;
    }
    .gal_container:after {
      clear: both;
    }
    .gitem {
      float: left;
      margin-bottom: 15px;
    }
    .gitem {
      max-width: 100%;
      max-height: 100%;
      vertical-align: bottom;
    }
    .first-gitem {
      clear: both;
    }
    /* remove margin bottom on last row */
    .last-row, .last-row ~ .gitem {
      margin-bottom: 0;
    }
  </style>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.0.3/jquery.min.js"></script>

</head>
<body class="gal_body">
<main>
	<header id="header">
		<h1>RG Infinite scroll demo</h1>
		<p>
			하단 끝으로 스크롤하면 데이터를 추가로 불러오는 스크립트 데모.<br/>
			$.load()메서드를 사용하여 불러올 파일의 일부 엘리먼트를 가져온다.
		</p>
	</header>

	<div class="gal_container" id="body">
		<button class="demo-more" id="more">더보기</button>
	</div>
</main>
<script src="../src/js/RGInfiniteScroll.js"></script>
</body>
</html>
