    <script>   
        var uluru = {lat: 33.306090, lng: 126.289434};
        var mapContainer = document.getElementById('map'), 
            mapOption = {
                  zoom: 13,
                  center: uluru
            };
        
        var map = new google.maps.Map(mapContainer, mapOption);

        google.maps.event.addDomListener(window, 'load');
        
        
        document.getElementById("cos").addEventListener("mouseover", onMarker);
        //document.getElementById("cos").addEventListener("mouseout", outMarker);
        
        function onMarker(){
            var marker = new google.maps.Marker({
                position: uluru,
                map: map
            });
            marker.setMap(map);
        }
        
        function outMarker(){
            setMapOnAll(null);
        }
