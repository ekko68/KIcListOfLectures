
<h2>{{titleName}}&nbsp; {{books.length}}권</h2>
<ul>
  <li *ngFor="let book of books">
    <img src="../assets/image/{{book.img}}" width="100" height="100">
     {{book.name}}
  </li>
</ul>
<input type="text" name="titleName" value="홍길동"><br>
<input type="text" [name]="titleName" value="홍길동"><br>
<input type="text" [name]="'titleName'" value="홍길동"><br>
<hr>
<h1>{{test}}</h1>
<input type="text" [(ngModel)]="test"><br>
<button (click)="sayEcho($event)">이벤트</button>
<button (click)="setTest('자바')">자바</button>
<button (click)="setTest('Angular4')">Angular4</button>

<p>안녕하세요</p>
<p [class.font-red]=true>안녕하세요2</p>
<p [class.font-red]=false>안녕하세요3</p>
<p [class.font-blue]=true>안녕하세요4</p>
<p [style.color]="'yellow'">안녕하세요5</p>
