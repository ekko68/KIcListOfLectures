<h1>모델을 이용하는 경우</h1>
<form [formGroup]="form" (ngSubmit)="handleSubmit($event)">
  소문자:<input type="text" placeholder="소문자 3글자" required
                pattern="[a-z]{3}" formControlName="lowerCase">
  대문자:<input type="text" placeholder="대문자 3글자" 
                 formControlName="upperCase">
  숫자입력:<input type="text" placeholder="100이상"
                 formControlName="gt100Case">
  <button (click)="setValue()">값 저장</button>
  <button (click)="reset()">지우기</button>
  <button type="submit" *ngIf="form.valid">확인</button>
</form>
