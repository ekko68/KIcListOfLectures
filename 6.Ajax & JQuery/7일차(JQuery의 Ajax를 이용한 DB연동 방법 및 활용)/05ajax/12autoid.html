<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>jquery예제(12autoid.html )</title>
<link rel="stylesheet" href="autoid.css" type="text/css">
<script type="text/javascript"
            src="http://code.jquery.com/jquery-3.2.1.min.js">
</script>
<script>
$(function(){ 
	//검색입력하기전에 처음에는 목록이 X
	$('.listbox').hide()//<->show()
	$('.userid').keyup(function(){//검색어를 입력했다면
		var uid=$('.userid').val()
		//alert(uid)
		var data='userid='+uid //autoid.jsp에게 매개변수로 전달 {매개변수:값}
		$.ajax({
			type:'post',  /* type:get|post 전송방식 */
			url:'autoid.jsp', /* 요청문서 */
			data:data,//data:{매개변수명:값}
		    success:function(html){//<li>testkim</li>
		    	$('.listbox').show()//스타일 적용시킬 목록을 화면에 출력
		    	$('.namelist').html(html)
		    	//하이라이트효과
		    	$('li').hover(function(){
		    		$(this).addClass('hover')
		    	},function(){
		    		$(this).removeClass('hover')
		    	})
		    	//나오는 항목을 클릭
		    	$('li').click(function(){
		    		$('.userid').val($(this).text())
		    		$('.listbox').hide()//목록창 감추기
		    	})
		    }//success
		})//$.ajax
		return false;//전송X
	   })
})
</script>
</head>
<body>
<h1>검색할 id를 입력하세요</h1>
<form>
검색어:<input type="text" name="userid" class="userid" ><br>
<div class="listbox">
    <div class="namelist"></div>
</div>
</form>
</body>
</html>
