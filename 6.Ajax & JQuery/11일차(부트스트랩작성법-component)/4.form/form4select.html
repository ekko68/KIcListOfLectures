<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 위 3개의 메타 태그는 *반드시* head 태그의 처음에 와야합니다; 어떤 다른 콘텐츠들은 반드시 이 태그들 *다음에* 와야 합니다 -->
    <title>부트스트랩 101 템플릿</title>

    <!-- 부트스트랩 -->
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/custom1.css" rel="stylesheet">
    <!-- IE8 에서 HTML5 요소와 미디어 쿼리를 위한 HTML5 shim 와 Respond.js -->
    <!-- WARNING: Respond.js 는 당신이 file:// 을 통해 페이지를 볼 때는 동작하지 않습니다. -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="container">
          <h5>bootstrap 기타 입력폼예제</h5>
          <h5>textarea</h5>
          <!-- rows속성만 사용(기본적으로 넓이는 100%) -->
          <textarea rows="5" ></textarea>
          
          <h5>input type="checkbox"</h5>
          <!-- checkbox(다중선택),radio(하나만 선택) -->
          <div class="checkbox">
             <label>
                <input type="checkbox" value=""> 여기는 체크박스 사용
             </label>
          </div>
          <div class="checkbox">
             <label>
                <input type="checkbox" value=""> 체크박스는 다중선택이 가능
             </label>
          </div>
          <!-- Radio(수직정렬) -->
          <h5>input type="radio"</h5>
          <div class="radio">
             <label>
                <input type="radio" name="optionRadios" id="optionRadios1" 
                           value="option1" checked> 여기는 라디오박스 사용
             </label>
          </div>
          <div class="radio">
             <label>
                <input type="radio" name="optionRadios" id="optionRadios2" 
                           value="option2"> 여기는 라디오박스 사용2
             </label>
          </div>
          <hr>
          
          <h5>checkbox-inline 선택자를 사용</h5>
          
             <label class="checkbox-inline">
                <input type="checkbox"  id="inlineCheckbox1" value="option1"> 1
             </label>
          
             <label class="checkbox-inline">
                <input type="checkbox"  id="inlineCheckbox2" value="option2"> 2
             </label>
         
          <!-- Radio(수평정렬) -->
          <h5>radio-inline선택자</h5>
             <label class="radio-inline">
                <input type="radio" name="optionRadios" id="optionRadios1" 
                           value="option1" checked> r1
             </label>
             <label>
                <input type="radio" name="optionRadios" id="optionRadios2" 
                           value="option2"> r2
             </label>
            <h5>콤보박스</h5>
            <!-- input과 동일하게 width->100%적용 -->
            <select class="form-control">
               <option>1</option>
               <option>2</option>
               <option>3</option>
            </select>
            <!-- 다중선택(multiple)속성을 부여한다. -->
            <select multiple class="form-control">
               <option>1</option>
               <option>2</option>
               <option>3</option>
            </select>
          
          
          
    </div>
    <!-- jQuery (부트스트랩의 자바스크립트 플러그인을 위해 필요합니다) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <!-- 모든 컴파일된 플러그인을 포함합니다 (아래), 원하지 않는다면 필요한 각각의 파일을 포함하세요 -->
    <script src="../js/bootstrap.min.js"></script>
  </body>
</html>
