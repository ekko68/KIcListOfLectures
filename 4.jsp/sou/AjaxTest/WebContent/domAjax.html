<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ajax의 개요및 작성법(xhr객체)</title>
<script>
     window.onload=function(){
    	 //IE(ActiveXObject속성), IE외의 chrome,,,(XMLHttpRequest속성)
    	 //IE(7이후 부터),IE외의 chrome=>XMLHttpRequest속성
    	 //1.xhr객체를 얻어오기(브라우저별로 얻어오는 구문틀림)
    	 if(window.XMLHttpRequest){
    		 var xhrObject=new XMLHttpRequest()//객체를 생성->반환
    		 alert(xhrObject) //
    	 }
     }
</script>
</head>

</html>
