<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>jquery예제</title>
<script type="text/javascript"
            src="http://code.jquery.com/jquery-3.2.1.min.js">
</script>
<script>
$(function(){ 
	$('#submit').click(function(){
		$('#result').empty();
		 var form_data=$('form').serializeArray();
		 /*
		$.each(form_data,function(index,value){
			$('#result').append(value.name+"="+value.value+"<br>")
		}) */
		//var form_data=$('form').serialize();
		//$('#result').text(form_data);
		
		$.post('form.jsp',form_data,function(args){//<b>홍길동</b>,홍길동
	    	//args-><%=name%>님 jQuery Ajax 환영합니다.
	    	$('#result').html(args)
	    })
	})
})
</script>
</head>
<body>
<form>
 <input type="hidden" name="seq" value="1">
 <label>이름을 입력하세요:</label>
 <input type="text" name="username"><br>
 <label>패스워드를 입력하세요</label>
 <input type="password" name="password"><br>
 <input type="checkbox" name="hobby" value="music">music
 <input type="checkbox" name="hobby" value="yoga">yoga
 <input type="checkbox" name="hobby" value="reading">reading<br>
 <input type="button" id="submit" value="전송"/>
</form>
<hr>
<div id="result"></div>
</body>
</html>
