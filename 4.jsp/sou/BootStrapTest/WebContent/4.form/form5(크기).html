<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 위 3개의 메타 태그는 *반드시* head 태그의 처음에 와야합니다; 어떤 다른 콘텐츠들은 반드시 이 태그들 *다음에* 와야 합니다 -->
    <title>부트스트랩 101 템플릿</title>

    <!-- 부트스트랩 -->
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/custom1.css" rel="stylesheet">
    <!-- IE8 에서 HTML5 요소와 미디어 쿼리를 위한 HTML5 shim 와 Respond.js -->
    <!-- WARNING: Respond.js 는 당신이 file:// 을 통해 페이지를 볼 때는 동작하지 않습니다. -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <div class="container">
          <h1>bootstrap 예제(폼양식)</h1>
          <form>
          <!-- 입력불가 -->
           <label for="Name">이름</label>
           <input type="text" disabled placeholder="이름">
           <label for="emailaddress">이메일</label>
           <input type="email" placeholder="이메일">
           <button type="submit">확인</button>
          </form>
          <hr>
          <h4 class="text-primary">부트스트랩의 폼양식 적용</h4>
          <form role="form"><!-- 폼역할을 한다는 표시 -->
           <div class="form-group">
               <label for="Name">이름</label>
               <input type="text" class="form-control" placeholder="이름">
           </div>
           
           <div class="form-group">
           <label for="emailaddress">이메일</label>
           <input type="email" class="form-control" disabled  placeholder="이메일">
           </div>
           
           <div class="form-group">
           <button type="submit">확인</button>
           </div>
          </form>
          <hr>
          <!--
             그리드시스템을 이용해서 컬럼의 크기를 조절이 가능
             해당 input태그를 div태그로 감싼후 그리드 시스템에서 사용하는 클래스
             선택자를 적용하면 된다.
            -->
          <h4 class="text-primary">그리드시스템을 이용해서 컬럼의 크기</h4>
          <div class="row">
              <div class="col-sm-2 col-lg-2">
              <input type="text" class="form-control" placeholder="col-sm-2 col-lg-2">
              </div>
              
              <div class="col-sm-3 col-lg-3">
              <input type="text" class="form-control" placeholder="col-sm-3 col-lg-3">
              </div>
              
              <div class="col-sm-4 col-lg-4">
              <input type="text" class="form-control" placeholder="col-sm-4 col-lg-4">
              </div>
          </div>
          
          
          
          
          
          
          
          
    </div>
    <!-- jQuery (부트스트랩의 자바스크립트 플러그인을 위해 필요합니다) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <!-- 모든 컴파일된 플러그인을 포함합니다 (아래), 원하지 않는다면 필요한 각각의 파일을 포함하세요 -->
    <script src="../js/bootstrap.min.js"></script>
  </body>
</html>
