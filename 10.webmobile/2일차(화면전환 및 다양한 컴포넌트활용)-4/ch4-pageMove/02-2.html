<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>jquery mobile 예제</title>
</head>
<body>
<!-- page지정 -->
<div data-role="page">
    <!-- 1.header지정 -->
    <div data-role="header">
         <h1>두번째 화면페이지</h1>
         <!-- 이전으로 가는 기능을 부여(data-rel="back") -->
    <a data-icon="arrow-l" data-rel="back">이전</a>
    </div>
    <!-- 2.content 지정-->
    <div data-role="content">
         <p>Hello Second Page</p>
    </div>
    <!-- 3.Footer 지정 -->
    <div data-role="footer">
         <h1>화면하단</h1>
    </div>
</div>
</body>
</html>
